<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    label { display: block; margin: 12px 0 4px; font-weight: 600; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 10px 18px; border: 0; border-radius: 8px; background: #3B82F6; color: #fff; font-weight: 600; cursor: pointer; }
    #status { margin-top: 12px; }
    ul { margin-top: 24px; padding-left: 18px; }
  </style>
</head>
<body>
  <h1>Submit a message</h1>
  <label>Name</label>
  <input id="name" />
  <label>Email</label>
  <input id="email" type="email" />
  <label>Message</label>
  <textarea id="message" rows="4"></textarea>
  <button id="send">Submit</button>
  <div id="status"></div>

  <h1>Recent submissions</h1>
  <ul id="list"></ul>

  <script>
    async function load() {
      const res = await fetch('/api/submissions');
      const rows = await res.json();
      document.getElementById('list').innerHTML =
        rows.map(r => `<li><strong>${r.name}</strong> (${r.email}): ${r.message}</li>`).join('');
    }
    document.getElementById('send').onclick = async () => {
      const body = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value
      };
      const res = await fetch('/api/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      document.getElementById('status').textContent = data.ok ? 'Saved!' : ('Error: ' + data.error);
      if (data.ok) load();
    };
    load();
  </script>
</body>
</html>
