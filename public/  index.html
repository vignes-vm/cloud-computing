<form id="form">

<input
type="text"
id="name"
placeholder="Name">

<button>Submit</button>

</form>

<script>

document.getElementById("form").onsubmit=async(e)=>{

e.preventDefault();

await fetch("/submit",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:document.getElementById("name").value

})

});

alert("Submitted");

}

</script>
